data_dir: data/processed
processed_file: ${.data_dir}/fnspid_subset.parquet
fusion_mode: late
seq_len: 30
n_features: 6
max_news_chars_per_day: 256
feature_columns:
  - open
  - high
  - low
  - close
  - volume
  - change_pct
label_threshold_pct: 0.5
max_news_per_window: 32
max_news_chars: 512
top_tickers: 80
train_years: [2018, 2019, 2020, 2021]
val_years: [2022]
test_years: [2023]
window_stride: 30
batch_size: 32
num_workers: 0
pin_memory: true
