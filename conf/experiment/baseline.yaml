# @package _global_
# OHLCV-only tabular baseline (default: Random Forest; also hist_gradient_boosting | xgboost).
#
#   uv run python -m stock_forecaster.baseline.train +experiment=baseline

defaults:
  - override /data: thr03
  - override /mlflow: default
  - _self_

baseline:
  model_type: random_forest
  params:
    n_estimators: 300
    max_depth: 12
    min_samples_leaf: 5
    class_weight: balanced
    random_state: ${seed}
    n_jobs: -1
  run_name: rf_baseline
  output_dir: models/baseline
  metrics_path: artifacts/baseline_rf_metrics.json

mlflow:
  log_model: true
  log_plots: false
