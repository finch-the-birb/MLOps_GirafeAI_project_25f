# Inference stack: Triton (ONNX) + optional FastAPI (run on host via uvicorn for FinBERT preprocess).
services:
  triton:
    image: nvcr.io/nvidia/tritonserver:23.10-py3
    container_name: stock-triton
    ports:
      - "8000:8000"
    volumes:
      - ./triton_model_repo:/models
    command: >
      tritonserver
      --model-repository=/models
      --model-control-mode=explicit
      --load-model=multimodal_model_early
    restart: unless-stopped
